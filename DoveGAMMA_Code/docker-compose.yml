version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: dovegamma_db
    environment:
      MYSQL_ROOT_PASSWORD: dovegamma123
      MYSQL_DATABASE: dovegamma
      MYSQL_USER: dove
      MYSQL_PASSWORD: gamma123
    ports:
      - "3306:3306"
    volumes:
      - dovegamma_data:/var/lib/mysql
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

volumes:
  dovegamma_data: